// Marketplace screen — based on Auto-Genius-main/components/Marketplace.tsx

        <header className="pt-2">
          <h1 className="text-2xl font-bold text-center text-white">Marketplace</h1>

        <div className="space-y-4">
          {filtered.map(car => (
            <div key={car.id} onClick={() => onSelectCar(car)} className="bg-[#333] rounded-xl overflow-hidden border border-[#444] active:border-[#175AC8] cursor-pointer transition-all">
              <div className="relative h-44 w-full bg-gradient-to-br from-[#1f1f1f] to-[#292929]">

          <Detail icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>} label="KM" value={`${car.mileage.toLocaleString('pt-BR')}`} />
          <Detail icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2"/></svg>} label="Cor" value={car.color} />
          <Detail icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" x2="15" y1="22" y2="22"/><line x1="4" x2="14" y1="9" y2="9"/><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"/><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2a2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"/></svg>} label="Combustível" value={car.fuelType} />
        </div>

        <div className="bg-[#333] rounded-xl p-4 border border-[#444]">
          <h3 className="text-sm font-semibold mb-2 text-white">Descrição</h3>
          <p className="text-[#bbb] text-xs leading-relaxed">{car.description}</p>
        </div>

        <div className="bg-[#333] rounded-xl p-4 border border-[#444]">
          <h3 className="text-sm font-semibold mb-3 flex items-center gap-2 text-white">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#175AC8" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
            Compartilhar
          </h3>
          <div className="flex gap-2">
            <button className="flex-1 bg-[#1877F2]/10 text-[#1877F2] py-2 rounded-lg flex items-center justify-center border border-[#1877F2]/30 text-xs font-medium">Facebook</button>
            <button className="flex-1 bg-[#1DA1F2]/10 text-[#1DA1F2] py-2 rounded-lg flex items-center justify-center border border-[#1DA1F2]/30 text-xs font-medium">Twitter</button>
            <button className="flex-1 bg-[#25D366]/10 text-[#25D366] py-2 rounded-lg flex items-center justify-center border border-[#25D366]/30 text-xs font-medium">WhatsApp</button>
          </div>
        </div>
      </main>

      {!isOwner && (
        <div className="absolute bottom-0 left-0 right-0 p-3 bg-[#292929]/95 backdrop-blur-sm border-t border-[#3a3a3a]">
          <button className="w-full bg-[#175AC8] text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg>
            Tenho Interesse
          </button>
        </div>
      )}
    </div>
  );
}




// BottomNav — based on Auto-Genius-main/components/BottomNav.tsx
function BottomNav({ active, onChange }) {
  const items = [
    { id: 'loja', label: 'Loja', icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2a2.7 2.7 0 0 1-1.59-.63.5.5 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.5.5 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.5.5 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.5.5 0 0 0-.82 0A2.7 2.7 0 0 1 4 12a2 2 0 0 1-2-2V7"/></svg> },
    { id: 'comunidade', label: 'Comunidade', icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> },
    { id: 'garagem', label: 'Garagem', icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg> },
    { id: 'conta', label: 'Conta', icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
  ];
  return (
    <div className="absolute bottom-0 left-0 right-0 h-16 bg-[#333] border-t border-[#444] flex justify-around items-center z-50">
      {items.map(it => (
        <button key={it.id} onClick={() => onChange(it.id)} className={`flex flex-col items-center justify-center flex-1 transition-colors ${active === it.id ? 'text-[#175AC8]' : 'text-[#999]'}`}>
          {it.icon}
          <span className="text-[10px] mt-1 font-medium">{it.label}</span>
        </button>
      ))}
    </div>
  );
}




function App() {
  const [authed, setAuthed] = useState(false);
  const [view, setView] = useState('loja');
  const [selectedCar, setSelectedCar] = useState(null);
  const [user, setUser] = useState(window.AG_DATA.user);
  const [cars, setCars] = useState(window.AG_DATA.marketplace);
  const [posts, setPosts] = useState(window.AG_DATA.posts);
  const [garage] = useState(window.AG_DATA.garage);
  const events = window.AG_DATA.events;
  const quests = window.AG_DATA.quests;

  useEffect(() => {
    const saved = localStorage.getItem('ag_state_v1');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        if (s.authed !== undefined) setAuthed(s.authed);
        if (s.view) setView(s.view);
      } catch {}
    }
  }, []);
  useEffect(() => {
    localStorage.setItem('ag_state_v1', JSON.stringify({ authed, view }));
  }, [authed, view]);

  const toggleLikeCar = (id) => {
    setCars(cs => cs.map(c => c.id === id ? { ...c, isLiked: !c.isLiked, likes: c.isLiked ? c.likes - 1 : c.likes + 1 } : c));
  };
  const likePost = (id) => {
    setPosts(ps => ps.map(p => p.id === id ? { ...p, isLiked: !p.isLiked, likes: p.isLiked ? p.likes - 1 : p.likes + 1 } : p));
  };
  const completeQuest = (qid, points) => {
    setUser(u => {
      if (u.completedQuests.includes(qid)) return u;
      return { ...u, completedQuests: [...u.completedQuests, qid], gamification: { ...u.gamification, points: u.gamification.points + points } };
    });
  };

  let screen;
  if (!authed) {
    screen = <LoginScreen onLogin={() => setAuthed(true)} />;
  } else if (selectedCar) {
    const isOwner = view === 'garagem';
    screen = <CarDetailScreen car={selectedCar} isOwner={isOwner} onBack={() => setSelectedCar(null)} />;
  } else if (view === 'loja') {
    screen = <MarketplaceScreen cars={cars} onSelectCar={setSelectedCar} onToggleLike={toggleLikeCar} />;
  } else if (view === 'conta') {
    screen = <DashboardScreen user={user} quests={quests} onCompleteQuest={completeQuest} />;
  } else if (view === 'garagem') {
    screen = <GaragemScreen user={user} garage={garage} onViewCar={(c) => setSelectedCar({ ...c, price: 0, mileage: 0, color: '-', fuelType: '-', description: `Veículo da garagem de ${user.name}.` })} />;
  } else if (view === 'comunidade') {
    screen = <ComunidadeScreen user={user} posts={posts} events={events} onLikePost={likePost} />;
  }

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px 0', background: '#1a1a1a' }}>
      <div style={{
        width: 390, height: 820, borderRadius: 48, overflow: 'hidden',
        position: 'relative', background: '#000',
        boxShadow: '0 40px 80px rgba(0,0,0,0.5), 0 0 0 10px #1a1a1a, 0 0 0 11px #333',
      }}>
        <div style={{
          position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
          width: 120, height: 34, borderRadius: 22, background: '#000', zIndex: 50,
        }} />
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 50, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 28px', zIndex: 40, color: 'white', fontSize: 15, fontWeight: 600, fontFamily: '-apple-system, system-ui' }}>
          <span>9:41</span>
          <span style={{ width: 120 }}></span>
          <span style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
            <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="6" width="3" height="4" rx="0.5" fill="white"/><rect x="4.5" y="4" width="3" height="6" rx="0.5" fill="white"/><rect x="9" y="2" width="3" height="8" rx="0.5" fill="white"/><rect x="13.5" y="0" width="3" height="10" rx="0.5" fill="white"/></svg>
            <svg width="24" height="11" viewBox="0 0 24 11"><rect x="0.5" y="0.5" width="20" height="10" rx="3" stroke="white" strokeOpacity="0.5" fill="none"/><rect x="2" y="2" width="17" height="7" rx="1.5" fill="white"/><path d="M22 4v3c.7-.2 1-.7 1-1.5S22.7 4.2 22 4z" fill="white" fillOpacity="0.5"/></svg>
          </span>
        </div>
        <div className="relative w-full h-full bg-[#292929]" data-screen-label={authed ? (selectedCar ? 'Detalhe' : view) : 'Login'} style={{ paddingTop: 50 }}>
          <div className="absolute inset-0 overflow-y-auto scroll-area" style={{ top: 50, paddingBottom: authed && !selectedCar ? '80px' : '24px' }}>
            {screen}
          </div>
          {authed && !selectedCar && (
            <BottomNav active={view} onChange={setView} />
          )}
        </div>
        <div style={{
          position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
          width: 134, height: 5, borderRadius: 100,
          background: 'rgba(255,255,255,0.6)', zIndex: 60, pointerEvents: 'none',
        }} />
      </div>
    </div>
  );
}

try {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
} catch (e) {
  document.getElementById('err').textContent = 'Render error: ' + (e.stack || e.message || e);
}

</script>
</body>
</html>
